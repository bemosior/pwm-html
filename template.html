<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 1.125rem;
      line-height: 1.75;
      color: #1a1a1a;
      background: #fafaf8;
      padding: 3rem 1.5rem;
    }

    .page-layout {
      display: grid;
      grid-template-columns: minmax(min-content, 15vw) 1fr;
      gap: 3rem;
      max-width: 960px;
      margin: 0 auto;
    }

    @media (max-width: 700px) {
      .page-layout { grid-template-columns: 1fr; gap: 2rem; }
    }

    /* ── Sidebar ── */

    .course-nav {
      position: sticky;
      top: 3rem;
      align-self: start;
      font-family: 'Menlo', 'Consolas', monospace;
      font-size: 0.8rem;
      line-height: 1.6;
    }

    .nav-section {
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 0.68rem;
      color: #999;
      margin-top: 1.25rem;
      margin-bottom: 0.25rem;
    }

    .nav-section:first-child { margin-top: 0; }

    .course-nav ul { list-style: none; padding: 0; margin: 0; }
    .course-nav li + li { margin-top: 0.1rem; }

    .course-nav a {
      color: #888;
      text-decoration: none;
      display: block;
      padding: 0.15em 0;
    }

    .course-nav a:hover { color: #1a1a1a; }
    .course-nav a.active { color: #1a1a1a; font-weight: bold; }

    /* ── Lesson content ── */

    .lesson { max-width: 680px; }

    h1 { font-size: 2rem; line-height: 1.2; margin-bottom: 0.5rem; }
    h2 { font-size: 1.4rem; margin-top: 2.5rem; margin-bottom: 0.75rem; }
    h3 { font-size: 1.15rem; margin-top: 2rem; margin-bottom: 0.5rem; }

    p { margin-top: 1rem; }
    p:first-child { margin-top: 0; }

    ul, ol { margin-top: 1rem; padding-left: 1.75rem; }
    li + li { margin-top: 0.35rem; }

    code {
      font-family: 'Menlo', 'Consolas', monospace;
      font-size: 0.875em;
      background: #efefeb;
      padding: 0.1em 0.35em;
      border-radius: 3px;
    }

    pre {
      margin-top: 1.25rem;
      background: #1e1e1e;
      color: #d4d4d4;
      padding: 1.25rem 1.5rem;
      border-radius: 6px;
      overflow-x: auto;
    }

    pre code {
      background: none;
      padding: 0;
      font-size: 0.9rem;
      color: inherit;
    }

    blockquote {
      margin-top: 1.25rem;
      border-left: 3px solid #c8c8c0;
      padding-left: 1rem;
      color: #555;
    }

    .description {
      margin-top: 0.4rem;
      color: #666;
      font-style: italic;
    }

    hr {
      border: none;
      border-top: 1px solid #e0e0d8;
      margin: 2.5rem 0;
    }

    img, video {
      display: block;
      max-width: 100%;
      margin-top: 1.25rem;
      border-radius: 4px;
    }

    .pdf-download {
      display: inline-flex;
      align-items: center;
      gap: 0.4em;
      margin-top: 1.25rem;
      padding: 0.5em 1em;
      background: #1a1a1a;
      color: #fafaf8;
      font-family: 'Menlo', 'Consolas', monospace;
      font-size: 0.875rem;
      text-decoration: none;
      border-radius: 4px;
    }

    .pdf-download::before { content: '↓'; }
    .pdf-download:hover { background: #333; }

    /* ── Prev/next navigation ── */

    .lesson-nav {
      display: flex;
      justify-content: space-between;
      padding: 1rem 0;
      border-top: 1px solid #e0e0d8;
      font-family: 'Menlo', 'Consolas', monospace;
      font-size: 0.8rem;
    }

    .lesson-nav:first-child {
      border-top: none;
      border-bottom: 1px solid #e0e0d8;
      margin-bottom: 1.5rem;
    }

    .lesson-nav:last-child { margin-top: 2.5rem; }

    .lesson-nav a { color: #888; text-decoration: none; }
    .lesson-nav a:hover { color: #1a1a1a; }
  </style>
</head>
<body>
  <div class="page-layout">
    {{sidebar}}
    <article class="lesson">
      {{lesson-nav}}
      {{content}}
      {{lesson-nav}}
    </article>
  </div>
</body>
</html>
